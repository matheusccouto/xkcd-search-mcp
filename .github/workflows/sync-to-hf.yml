name: sync-to-hf

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf "https://couto:$HF_TOKEN@huggingface.co/spaces/couto/xkcd-search"
          git push hf HEAD:main --force
