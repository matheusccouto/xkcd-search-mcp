name: index-daily

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Max comics to fetch this run (leave empty for full). Use for fast CI iteration."
        required: false
        default: ""
      publish:
        description: "Publish the resulting index.sqlite as a GitHub Release asset."
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

permissions:
  contents: write

concurrency:
  group: index-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      XKCD_INDEX_DIR: ${{ github.workspace }}/build
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Cache Hugging Face model hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-hub-bge-small-en-v1.5

      - name: Restore partial index
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/build
          key: index-partial-${{ github.run_id }}
          restore-keys: |
            index-partial-

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Build index
        env:
          XKCD_INDEXER_LIMIT: ${{ inputs.limit }}
        run: |
          mkdir -p "$XKCD_INDEX_DIR"
          uv run python -m xkcd_search.indexer_main

      - name: Save partial index cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/build
          key: index-partial-${{ github.run_id }}

      - name: Check artifact size
        run: |
          ls -lh "$XKCD_INDEX_DIR/index.sqlite"
          size=$(stat -c%s "$XKCD_INDEX_DIR/index.sqlite")
          echo "index.sqlite is $size bytes"
          if [ "$size" -gt 1073741824 ]; then
            echo "artifact exceeds 1 GiB; aborting" >&2
            exit 1
          fi

      - name: Publish release
        if: |
          success() &&
          (inputs.publish != 'false') &&
          (inputs.limit == '' || inputs.limit == null)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="data-$(date -u +%Y-%m-%d-%H%M%S)"
          gh release create "$tag" \
            "$XKCD_INDEX_DIR/index.sqlite" \
            --title "Index $(date -u +%Y-%m-%d)" \
            --notes "Automated daily rebuild. Corpus: xkcd.com + explainxkcd.com wikitext (CC BY-SA 3.0)."
