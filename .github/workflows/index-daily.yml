name: index-daily

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: index-daily
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Cache Hugging Face model hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-hub-bge-small-en-v1.5  # Keep in sync with builder.py EMBED_MODEL_NAME

      - name: Restore partial index
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/xkcd-search
          key: index-partial-${{ github.run_id }}
          restore-keys: |
            index-partial-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build index
        run: uv run python -m xkcd_search.builder

      - name: Save partial index cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/xkcd-search
          key: index-partial-${{ github.run_id }}

      - name: Check artifact size
        run: |
          ls -lh ~/.cache/xkcd-search/index.sqlite
          size=$(stat -c%s ~/.cache/xkcd-search/index.sqlite)
          echo "index.sqlite is $size bytes"
          if [ "$size" -gt 1073741824 ]; then
            echo "artifact exceeds 1 GiB; aborting" >&2
            exit 1
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="data-$(date -u +%Y-%m-%d-%H%M%S)"
          gh release create "$tag" \
            ~/.cache/xkcd-search/index.sqlite \
            --title "Index $(date -u +%Y-%m-%d)" \
            --notes "Automated daily rebuild. Corpus: xkcd.com + explainxkcd.com wikitext (CC BY-SA 3.0)."

      - name: Restart HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          curl -sf -X POST \
            "https://huggingface.co/api/spaces/couto/xkcd-search/restart" \
            -H "Authorization: Bearer $HF_TOKEN"
